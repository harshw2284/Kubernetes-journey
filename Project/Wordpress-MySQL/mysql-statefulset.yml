apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: capstone
  labels:
    app: capstone

spec:
  selector:
    matchLabels:
      app: capstone
  serviceName: mysql
  replicas: 1
  template:
    metadata:
      labels:
        app: capstone
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
          name: mysql                        
        resources:
          requests:
            memory: 512Mi
            cpu: 250m
          limits:
            memory: 1Gi
            cpu: 500m
        envFrom:
        - secretRef:
            name: mysql-secret

        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql

  volumeClaimTemplates:
  - metadata:
      name: mysql-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: standard
      resources:
        requests:
          storage: 1Gi
