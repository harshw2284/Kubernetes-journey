kind: HorizontalPodAutoscaler
apiVersion: autoscaling/v2

metadata:
  name: wordpress-hpa
  namespace: capstone

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wordpress
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
